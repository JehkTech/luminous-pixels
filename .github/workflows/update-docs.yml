name: Update Documentation

on:
  push:
    branches:
      - "**"
    paths-ignore:
      # Don't re-trigger when only README or workflow files changed
      - "README.md"
      - ".github/workflows/update-docs.yml"
      - ".github/scripts/update-docs.mjs"

permissions:
  contents: write

jobs:
  update-docs:
    name: Regenerate README with AI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch with a token that can push back to the branch
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run documentation update script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Optional: override the model (e.g. "gpt-4o")
          # OPENAI_MODEL: gpt-4o
        run: node .github/scripts/update-docs.mjs

      - name: Commit updated README
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # Only commit if README.md actually changed
          git diff --cached --quiet || git commit -m "docs: auto-update README [skip ci]"
          git push
